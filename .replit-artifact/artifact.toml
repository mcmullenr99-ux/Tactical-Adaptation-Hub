kind = "web"
previewPath = "/"
title = "TAG - Tactical Adaptation Group"
version = "1.0.0"
id = "artifacts/tag-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21398
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/tag-website run dev"

[services.env]
PORT = "21398"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/tag-website", "run", "build"]
publicDir = "artifacts/tag-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
